const menuInput = document.getElementById('menuInput');

// 사이즈 별칭 (파서용) — "그란데", "tall", "라지" 등을 카페 프리셋 이름으로 매핑
const SIZE_ALIAS = {
  'tall':    'Tall',    '톨':     'Tall',
  'grande':  'Grande',  '그란데': 'Grande',
  'venti':   'Venti',   '벤티':   'Venti',
  'regular': '레귤러',  '레귤러': '레귤러', '레규': '레귤러',
  'large':   '라지',    '라지':   '라지',   '라':   '라지',
};
function matchSizeToken(token, availableSizes) {
  const lower = token.toLowerCase();
  const exact = availableSizes.find(s => s.toLowerCase() === lower);
  if (exact) return exact;
  const mapped = SIZE_ALIAS[lower];
  return (mapped && availableSizes.includes(mapped)) ? mapped : null;
}

// 메뉴 텍스트 파서 — 온도/사이즈/추가옵션 토큰을 추출하고 나머지를 메뉴명으로
// 예) "아이스 아메리카노 그란데 샷추가 디카페인"
//     → { temp: 'ICE', size: 'Grande', addons: ['샷추가','디카페인'], menu: '아메리카노' }
function parseMenuLine(raw) {
  let text = (raw || '').trim();
  const result = { temp: null, size: null, addons: [], menu: '' };
  if (!text) return result;

  // 1) 온도 접두어 — 띄어쓰기 없이 붙은 경우(아이스아메리카노)도 지원
  const iceMatch = text.match(/^(아이스|차가운|시원한|찬)\s*/);
  const hotMatch = text.match(/^(핫|따뜻한?|따듯한?|뜨거운?)\s*/);
  if (iceMatch) { result.temp = 'ICE'; text = text.slice(iceMatch[0].length); }
  else if (hotMatch) { result.temp = 'HOT'; text = text.slice(hotMatch[0].length); }

  // 2) 남은 부분을 공백으로 나눠 토큰별로 분류 (사이즈/애드온/메뉴부분)
  const cafeId = CAFE_PRESETS[CONFIG.cafe] ? CONFIG.cafe : 'starbucks';
  const sizes  = CAFE_PRESETS[cafeId].sizes || [];
  const addons = CAFE_ADDONS[cafeId] || [];
  const tokens = text.split(/\s+/).filter(Boolean);
  const menuParts = [];

  for (const tok of tokens) {
    if (!result.size) {
      const s = matchSizeToken(tok, sizes);
      if (s) { result.size = s; continue; }
    }
    if (addons.includes(tok)) {
      if (!result.addons.includes(tok)) result.addons.push(tok);
      continue;
    }
    menuParts.push(tok);
  }

  result.menu = menuParts.join(' ');
  return result;
}

// 호환성: 기존 시그니처(문자열 → 스트립 후 문자열) 유지. 내부는 파서 재사용.
function normalizeMenuTemp(val) {
  const { temp, menu } = parseMenuLine(val);
  if (temp) setSingle('tempOptions', temp);
  return menu;
}

// 메뉴별 제약을 UI에 반영 (iceOnly/hotOnly/noSize)
// 빈 메뉴 or 제약 없는 메뉴 → 숨김 해제 (복원)
function applyMenuConstraints(menuName) {
  const c = getMenuConstraints(menuName || '');

  // 온도 칩: 금지된 쪽만 숨김, 허용된 쪽 자동 선택
  document.querySelectorAll('#tempOptions .chip').forEach(chip => {
    const val = chip.dataset.val;
    const blocked = (c.iceOnly && val === 'HOT') || (c.hotOnly && val === 'ICE');
    chip.classList.toggle('hide', blocked);
  });
  if (c.iceOnly) setSingle('tempOptions', 'ICE');
  if (c.hotOnly) setSingle('tempOptions', 'HOT');

  // 사이즈 섹션 (라벨 + 칩/커스텀 입력) 통째로 숨김/복원
  const sizeLabel  = document.getElementById('sizeLabel');
  const sizeChips  = document.getElementById('sizeOptions');
  const sizeCustom = document.getElementById('sizeCustom');
  if (c.noSize) {
    sizeLabel  && sizeLabel.classList.add('hide');
    sizeChips  && sizeChips.classList.add('hide');
    sizeCustom && sizeCustom.classList.add('hide');
  } else {
    sizeLabel  && sizeLabel.classList.remove('hide');
    // chips vs customInput 노출 여부는 applyCafeSizes가 결정
    if (typeof applyCafeSizes === 'function') applyCafeSizes();
  }
}

// 메뉴 입력 blur 시: 줄임말 확장 → 텍스트 파싱 → 온도/사이즈/추가옵션 + 제약 적용
menuInput.addEventListener('change', () => {
  const raw = menuInput.value.trim();
  if (!raw) {
    applyMenuConstraints('');
    updateDetailSummary();
    return;
  }
  // 줄임말(아아/따아 등) 단독 입력은 풀메뉴로 치환 (현재 카페 공식명으로)
  const shortSpec = MENU_SHORTCUTS[raw];
  if (shortSpec) {
    const cafeId  = CAFE_MENUS[CONFIG.cafe] ? CONFIG.cafe : 'starbucks';
    const resolved = resolveShortcutMenu(shortSpec, getCafeMenuList(cafeId));
    menuInput.value = resolved.name;
    if (shortSpec.temp) setSingle('tempOptions', shortSpec.temp);
    applyMenuConstraints(resolved.name);
    updateDetailSummary();
    return;
  }
  const parsed = parseMenuLine(raw);
  if (parsed.menu !== raw) menuInput.value = parsed.menu;
  if (parsed.temp) setSingle('tempOptions', parsed.temp);
  if (parsed.size) setSize(parsed.size);
  if (parsed.addons.length) {
    const merged = [...new Set([...getMulti('addonOptions'), ...parsed.addons])];
    setMulti('addonOptions', merged);
    if (typeof updateAddonCount === 'function') updateAddonCount();
  }
  applyMenuConstraints(menuInput.value);
  updateDetailSummary();
});

// ════════════════════════════════════════════════════════════════
// 🍽 커스텀 메뉴 드롭다운 (카페 앱 느낌: 이미지 + 이름 + ICE·Tall)
// ════════════════════════════════════════════════════════════════
const menuDropdown = document.getElementById('menuDropdown');
const menuPicker   = document.getElementById('menuPicker');
// hoisting 되는 var 로 선언 — TDZ 방어
var _dropdownItems = [];
var _dropdownHighlightedIdx = -1;

// 이미지 로드 실패 → 카테고리 이모지로 폴백 (onerror에서 호출)
window._menuImgFallback = function (img) {
  const emoji = img.dataset.fallback || '☕';
  const div = document.createElement('div');
  div.className = 'menu-thumb-fallback';
  div.textContent = emoji;
  if (img.parentNode) img.parentNode.replaceChild(div, img);
};

function menuCategory(name)    { return (MENU_META[name] || {}).category || 'coffee'; }
function menuDefaultTemp(name) { return (MENU_META[name] || {}).defaultTemp || 'ICE'; }

// 카테고리 + 온도 조합으로 이모지 선택.
// 뜨거운 컵(☕) / 찬 컵(🥤 · 🥛) / 얼음(🧊) 을 구분해서 직관성 높임.
function menuEmoji(name, temp) {
  const cat = menuCategory(name);
  const isHot = temp === 'HOT';
  switch (cat) {
    case 'espresso':    return '☕';          // 에스프레소는 항상 뜨거움
    case 'coldbrew':    return '🧊';          // 콜드브루 계열은 항상 얼음
    case 'frappuccino': return '🥤';          // 프라푸치노/블렌디드 = 얼음 컵
    case 'smoothie':    return '🥤';
    case 'blended':     return '🍓';
    case 'ade':         return '🍋';
    case 'fizzio':      return '🍋';
    case 'tea':         return isHot ? '🍵' : '🧋';
    case 'chocolate':   return isHot ? '☕' : '🍫';
    case 'latte':       return isHot ? '☕' : '🥛';
    case 'coffee':      return isHot ? '☕' : '🧋';
    default:            return isHot ? '☕' : '🥤';
  }
}
function menuImagePath(name) {
  const cafeId = CAFE_MENUS[CONFIG.cafe] ? CONFIG.cafe : 'starbucks';
  const slug = encodeURIComponent(name.replace(/\s+/g, '_'));
  return `./images/${cafeId}/${slug}.webp`;
}
function menuDisplayName(name, temp) {
  const prefix = temp === 'ICE' ? '아이스 ' : temp === 'HOT' ? '따뜻한 ' : '';
  return prefix + name;
}

function _normalizeMenuQuery(s) { return (s || '').toLowerCase().replace(/\s+/g, ''); }

// 필터에서 온도 접두어 제거 — "아이스 아메리카노" 쳐도 "아메리카노"로 매칭
function _stripTempPrefix(q) {
  return q.replace(/^(아이스|차가운|시원한|찬|핫|따뜻한?|따듯한?|뜨거운?|따|뜨)/, '');
}

// addedAt 문자열 → 최근 MENU_NEW_DAYS 일 이내면 true
function isNewMenu(addedAt) {
  if (!addedAt) return false;
  const t = new Date(addedAt).getTime();
  if (isNaN(t)) return false;
  return (Date.now() - t) < MENU_NEW_DAYS * 24 * 60 * 60 * 1000;
}

// 현재 카페의 유효 메뉴 목록 (공통 + 카페전용, CAFE_EXCLUDES 적용)
// 반환: [{ name, addedAt }]. 중복 이름은 카페별이 공통을 덮어씀.
function getCafeMenuList(cafeId) {
  const excludes = new Set(CAFE_EXCLUDES[cafeId] || []);
  const merged = new Map();
  COMMON_MENUS
    .filter(m => !excludes.has(m.name))
    .forEach(m => merged.set(m.name, m));
  (CAFE_MENUS[cafeId] || []).forEach(m => merged.set(m.name, m));
  return Array.from(merged.values());
}

// 줄임말 spec을 현재 카페 메뉴로 해석 (예: '아메리카노' → 스벅이면 '카페 아메리카노')
function resolveShortcutMenu(spec, cafeList) {
  const exact = cafeList.find(m => m.name === spec.menu);
  if (exact) return exact;
  const bySubstr = cafeList.find(m => m.name.includes(spec.menu));
  if (bySubstr) return bySubstr;
  return { name: spec.menu, addedAt: null };
}

function buildMenuDropdownEntries(filter) {
  const cafeId  = CAFE_MENUS[CONFIG.cafe] ? CONFIG.cafe : 'starbucks';
  const allMenus = getCafeMenuList(cafeId);

  const qRaw = _normalizeMenuQuery(filter);
  const q = _stripTempPrefix(qRaw);

  const entries = [];

  // 1) 줄임말 — 카페별 공식명으로 해석
  Object.entries(MENU_SHORTCUTS).forEach(([short, spec]) => {
    const resolved = resolveShortcutMenu(spec, allMenus);
    const shortN = _normalizeMenuQuery(short);
    const menuN  = _normalizeMenuQuery(resolved.name);
    const prefixMatch = q && shortN.startsWith(q);
    const nameMatch   = q && menuN.includes(q);
    if (q && !prefixMatch && !nameMatch) return;
    entries.push({
      kind: 'shortcut',
      shortcut: short,
      menu: resolved.name,
      temp: spec.temp,
      priority: prefixMatch ? 0 : 1,
      addedAt: resolved.addedAt,
    });
  });

  // 2) 일반 메뉴
  allMenus.forEach(m => {
    if (q && !_normalizeMenuQuery(m.name).includes(q)) return;
    entries.push({
      kind: 'menu',
      menu: m.name,
      temp: menuDefaultTemp(m.name),
      priority: 2,
      addedAt: m.addedAt,
    });
  });

  // 정렬:
  //  - 필터 없을 때 = 브라우징 상태: NEW 아이템이 전체 최상단 (눈에 띄게)
  //  - 필터 있을 때 = 검색 상태: priority(줄임말 prefix 매치 우선) 중시,
  //    동률이면 NEW 가 먼저
  entries.sort((a, b) => {
    const aNew = isNewMenu(a.addedAt) ? 0 : 1;
    const bNew = isNewMenu(b.addedAt) ? 0 : 1;
    if (!q && aNew !== bNew) return aNew - bNew;
    if (a.priority !== b.priority) return a.priority - b.priority;
    return aNew - bNew;
  });
  // 동일 (menu + temp) 중복 제거 (상위 우선으로 살아남음)
  const seen = new Set();
  const dedup = [];
  entries.forEach(e => {
    const key = e.menu + '|' + (e.temp || '');
    if (seen.has(key)) return;
    seen.add(key);
    dedup.push(e);
  });
  return dedup;
}

function renderMenuDropdown(filter = '') {
  // 모듈 초기화 타이밍에서 호출돼도 깨지지 않도록 DOM 직접 조회 (const TDZ 회피)
  const dropdownEl = document.getElementById('menuDropdown');
  if (!dropdownEl) return;

  const entries = buildMenuDropdownEntries(filter);
  _dropdownItems = entries;
  _dropdownHighlightedIdx = -1;

  if (entries.length === 0) {
    dropdownEl.innerHTML =
      '<div class="menu-empty">일치하는 메뉴가 없어요.<br>그대로 입력해도 주문돼요 ☕️</div>';
    return;
  }

  const preset = CAFE_PRESETS[CONFIG.cafe] || CAFE_PRESETS.starbucks;
  const firstSize = preset.sizes[0] || '';

  dropdownEl.innerHTML = entries.map((e, i) => {
    const displayName = menuDisplayName(e.menu, e.temp);
    const sub = (e.temp || 'ICE') + (firstSize ? ' · ' + firstSize : '');
    const newTag = isNewMenu(e.addedAt) ? '<span class="menu-new-tag">NEW</span>' : '';
    return `
      <div class="menu-item" id="menu-item-${i}" data-idx="${i}" role="option">
        <div class="menu-thumb">
          <img src="${menuImagePath(e.menu)}" alt="" loading="lazy"
               data-fallback="${menuEmoji(e.menu, e.temp)}"
               onerror="window._menuImgFallback(this)">
        </div>
        <div class="menu-text">
          <div class="menu-name">${escapeHtml(displayName)}${newTag}</div>
          <div class="menu-sub">${escapeHtml(sub)}</div>
        </div>
      </div>`;
  }).join('');
}

// 입력창을 화면 상단 근처(약 60px 지점)으로 끌어올려 드롭다운이 키보드에
// 덜 가리게. iOS 키보드가 올라온 뒤에 호출해야 정확.
// scrollIntoView 대신 scrollTo 로 명시적 target 지정 — iOS 호환성 ↑.
function scrollInputIntoViewForDropdown() {
  const mi = document.getElementById('menuInput');
  if (!mi || document.activeElement !== mi) return;
  const rect = mi.getBoundingClientRect();
  const currentY = window.scrollY || window.pageYOffset || 0;
  // 입력창 위 여백 30px — 4줄(≈280px) 드롭다운이 키보드 위에 충분히 보이도록
  // 최대한 상단으로 끌어올림.
  const headerOffset = 30;
  const targetY = currentY + rect.top - headerOffset;
  if (Math.abs(targetY - currentY) > 20) {
    window.scrollTo(0, Math.max(0, targetY));
  }
}

function showMenuDropdown() {
  const dd = document.getElementById('menuDropdown');
  const mi = document.getElementById('menuInput');
  if (dd) dd.classList.remove('hide');
  if (mi) mi.setAttribute('aria-expanded', 'true');
}
function hideMenuDropdown() {
  const dd = document.getElementById('menuDropdown');
  const mi = document.getElementById('menuInput');
  if (dd) {
    dd.classList.add('hide');
    dd.querySelectorAll('.menu-item.highlighted')
      .forEach(el => el.classList.remove('highlighted'));
  }
  if (mi) {
    mi.setAttribute('aria-expanded', 'false');
    mi.removeAttribute('aria-activedescendant');
  }
  _dropdownHighlightedIdx = -1;
}

function _updateDropdownHighlight() {
  const dd = document.getElementById('menuDropdown');
  const mi = document.getElementById('menuInput');
  if (!dd) return;
  const items = dd.querySelectorAll('.menu-item');
  items.forEach((el, i) => el.classList.toggle('highlighted', i === _dropdownHighlightedIdx));
  const el = items[_dropdownHighlightedIdx];
  if (el) {
    el.scrollIntoView({ block: 'nearest' });
    if (mi && el.id) mi.setAttribute('aria-activedescendant', el.id);
  } else if (mi) {
    mi.removeAttribute('aria-activedescendant');
  }
}

function selectMenuEntry(entry) {
  if (!entry) return;
  menuInput.value = entry.menu;
  const temp = entry.temp || menuDefaultTemp(entry.menu);
  if (temp) setSingle('tempOptions', temp);
  applyMenuConstraints(entry.menu);
  hideMenuDropdown();
  menuInput.blur(); // 모바일 키보드 내림
  updateDetailSummary();
}

// "아아" → "아메리카노" 자동 풀이 (드롭다운 미사용 경로 안전망)
function expandMenuShortcut() {
  const val = menuInput.value.trim();
  const spec = MENU_SHORTCUTS[val];
  if (!spec) return false;
  // 현재 카페의 공식명으로 해석 (스벅이면 '아메리카노' → '카페 아메리카노')
  const cafeId = CAFE_MENUS[CONFIG.cafe] ? CONFIG.cafe : 'starbucks';
  const resolved = resolveShortcutMenu(spec, getCafeMenuList(cafeId));
  menuInput.value = resolved.name;
  if (spec.temp) setSingle('tempOptions', spec.temp);
  applyMenuConstraints(resolved.name);
  updateDetailSummary();
  return true;
}

// ── 이벤트 바인딩 ────────────────────────────────────────
menuInput.addEventListener('focus', () => {
  if (typeof isPastDeadline === 'function' && isPastDeadline()) return;
  renderMenuDropdown(menuInput.value.trim());
  showMenuDropdown();
  // 포커스 시 한 번만 스크롤 (iOS 키보드가 올라온 뒤에 실행)
  setTimeout(scrollInputIntoViewForDropdown, 350);
});

menuInput.addEventListener('input', () => {
  if (typeof isPastDeadline === 'function' && isPastDeadline()) return;
  renderMenuDropdown(menuInput.value.trim());
  showMenuDropdown();
});

// iOS: 드롭다운 터치 시 input blur 가 먼저 발생 → setTimeout 150ms 뒤에 hide
// 하는 동안 click 이벤트가 먼저 발사되어 selectMenuEntry 가 실행됨.
// touchstart preventDefault 는 iOS 에서 click 자체를 취소해버려 탭 반응이
// 아예 안 먹음 → 걸지 않음. mousedown 도 마찬가지로 생략.

menuDropdown.addEventListener('click', e => {
  const item = e.target.closest('.menu-item');
  if (!item) return;
  const idx = parseInt(item.dataset.idx, 10);
  selectMenuEntry(_dropdownItems[idx]);
});

menuInput.addEventListener('blur', () => {
  // iOS 에서 click 이 touchend 후 살짝 늦게 발사되므로 여유있게 220ms
  setTimeout(hideMenuDropdown, 220);
});

menuInput.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (_dropdownItems.length === 0) return;
    _dropdownHighlightedIdx = Math.min(_dropdownHighlightedIdx + 1, _dropdownItems.length - 1);
    _updateDropdownHighlight();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (_dropdownItems.length === 0) return;
    _dropdownHighlightedIdx = Math.max(_dropdownHighlightedIdx - 1, 0);
    _updateDropdownHighlight();
  } else if (e.key === 'Enter') {
    if (_dropdownHighlightedIdx >= 0 && _dropdownItems[_dropdownHighlightedIdx]) {
      e.preventDefault();
      selectMenuEntry(_dropdownItems[_dropdownHighlightedIdx]);
    } else {
      // 하이라이트 없는 상태로 Enter → 즉시 파싱 실행 (change 이벤트 강제)
      menuInput.dispatchEvent(new Event('change'));
      hideMenuDropdown();
    }
  } else if (e.key === 'Escape') {
    hideMenuDropdown();
  }
});

document.addEventListener('click', e => {
  // 드롭다운은 body 직속이라 menuPicker 밖에 있음 — 둘 다 체크
  if (!menuPicker.contains(e.target) && !menuDropdown.contains(e.target)) {
    hideMenuDropdown();
  }
});

// max-height 는 CSS 에서 280px(≈4줄) 고정. 동적 조정을 하면 한글 IME 로 인한
// visualViewport 미세 변화에 드롭다운이 계속 재조정되어 '칸이 줄어드는' 듯한
// 느낌을 줌. 키보드가 일부 가리면 드롭다운 내부 스크롤로 대응.

// ════════════════════════════════════════════════════════════════
// Chip 선택 UI
// ════════════════════════════════════════════════════════════════
function setupChips(containerId, multi = false) {
  const c = document.getElementById(containerId);
  c.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    if (multi) {
      // 같은 그룹(data-group) 내에서는 한 번에 하나만 선택되게 (배타)
      const willActivate = !chip.classList.contains('active');
      if (willActivate && chip.dataset.group) {
        c.querySelectorAll(`.chip[data-group="${chip.dataset.group}"]`)
          .forEach(other => { if (other !== chip) other.classList.remove('active'); });
      }
      chip.classList.toggle('active');
    } else {
      c.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      chip.classList.add('active');
    }
    if (typeof updateDetailSummary === 'function') updateDetailSummary();
  });
}
setupChips('tempOptions');
setupChips('sizeOptions');
setupChips('addonOptions', true);

// 추가옵션 선택 개수 표시
const addonContainer = document.getElementById('addonOptions');
const addonCountEl = document.getElementById('addonCount');
// module 상단에서 applyConfig()가 호출될 때 applyCafeAddons → updateAddonCount
// 체인으로 불릴 수 있어, 모듈-스코프 const에 의존하지 않고 매번 DOM 조회.
function updateAddonCount() {
  const container = document.getElementById('addonOptions');
  const countEl   = document.getElementById('addonCount');
  if (!container || !countEl) return;
  const count = container.querySelectorAll('.chip.active').length;
  countEl.textContent = count > 0 ? `· ${count}개` : '';
  if (typeof updateDetailSummary === 'function') updateDetailSummary();
}
if (addonContainer) addonContainer.addEventListener('click', updateAddonCount);

function updateDetailSummary() {
  const temp = getSingle('tempOptions');
  const size = getSize();
  const container = document.getElementById('addonOptions');
  const addons = container ? container.querySelectorAll('.chip.active').length : 0;
  const memo = document.getElementById('memoInput')?.value.trim();
  const parts = [temp, size].filter(Boolean);
  if (addons) parts.push(`옵션 ${addons}개`);
  if (memo) parts.push('메모');
  const el = document.getElementById('detailSummaryText');
  if (el) el.textContent = parts.length ? `· ${parts.join(' · ')}` : '';
}

function getSingle(id) {
  return document.querySelector(`#${id} .chip.active`)?.dataset.val || '';
}
function getMulti(id) {
  return Array.from(document.querySelectorAll(`#${id} .chip.active`))
    .map(c => c.dataset.val);
}
function setSingle(id, val) {
  document.querySelectorAll(`#${id} .chip`).forEach(c => {
    c.classList.toggle('active', c.dataset.val === val);
  });
}
function setMulti(id, vals) {
  const set = new Set(vals || []);
  document.querySelectorAll(`#${id} .chip`).forEach(c => {
    c.classList.toggle('active', set.has(c.dataset.val));
  });
}

// ════════════════════════════════════════════════════════════════
// 탭
// ════════════════════════════════════════════════════════════════
function switchTab(target) {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === target);
  });
  document.getElementById('orderTab').classList.toggle('hide', target !== 'order');
  document.getElementById('statusTab').classList.toggle('hide', target !== 'status');
}
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

// ════════════════════════════════════════════════════════════════
// 카운트다운
// ════════════════════════════════════════════════════════════════
function isPastDeadline() { return Date.now() > DEADLINE; }

function lockFormIfDeadline() {
  if (!isPastDeadline()) return;
  // 마감: 탭+폼 숨기고 주문현황만 표시
  document.querySelector('.tabs').classList.add('hide');
  document.getElementById('orderTab').classList.add('hide');
  document.getElementById('statusTab').classList.remove('hide');
  if (IS_OWNER) document.getElementById('retryWrap').classList.remove('hide');
}

function setCountdownText(label, time) {
  const cd = document.getElementById('countdown');
  cd.innerHTML = `<span class="countdown-label">${label}</span><span class="countdown-time">${time}</span>`;
}

function updateCountdown() {
  const cd = document.getElementById('countdown');
  const diff = DEADLINE - Date.now();
  if (diff <= 0) {
    cd.classList.remove('urgent', 'critical');
    cd.classList.add('closed');
    setCountdownText(`${deadlineLabel} 마감`, '주문이 마감됐어요');
    lockFormIfDeadline();
    return;
  }
  cd.classList.remove('closed'); // 마감 → 연장 전환 시 회색 배경 해제
  cd.classList.toggle('urgent',   diff < 30 * 60 * 1000 && diff >= 10 * 60 * 1000);
  cd.classList.toggle('critical', diff < 10 * 60 * 1000);
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const remaining = h > 0 ? `${h}시간 ${m}분` : m > 0 ? `${m}분 ${s}초` : `${s}초`;
  setCountdownText(`${deadlineLabel} 마감`, `${remaining} 남음`);
}
updateCountdown();
lockFormIfDeadline();
setInterval(updateCountdown, 1000);

// ════════════════════════════════════════════════════════════════
// 상태 + localStorage 헬퍼 (이름별 주문 키 맵)
// ════════════════════════════════════════════════════════════════
let currentOrders = {};
let lastSyncedName = null;     // 폼이 현재 어느 이름에 대해 동기화됐는지
let firebaseDataLoaded = false;

const ORDER_KEYS_LS = `coffee_order_keys_${ROOM_ID}`;
const LAST_NAME_LS  = `coffee_last_name_${ROOM_ID}`;
function getOrderKeys() {
  try { return JSON.parse(localStorage.getItem(ORDER_KEYS_LS) || '{}'); }
  catch { return {}; }
}
function setOrderKey(name, key) {
  const keys = getOrderKeys();
  if (key) keys[name] = key; else delete keys[name];
  localStorage.setItem(ORDER_KEYS_LS, JSON.stringify(keys));
}

// 선호 메뉴 저장/불러오기
function getPrefs() {
  try { return JSON.parse(localStorage.getItem('coffee_prefs') || '{}'); }
  catch { return {}; }
}
function savePref(name, order) {
  const prefs = getPrefs();
  prefs[name] = { temp: order.temp, size: order.size, menu: order.menu, addons: order.addons, memo: order.memo };
  localStorage.setItem('coffee_prefs', JSON.stringify(prefs));
}

// 페이지 로드 시 마지막 선택 이름 복원 (방별 저장소)
const lastName = localStorage.getItem(LAST_NAME_LS);
if (lastName) {
  nameInput.value = lastName;
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('warn');
  if (type === 'warn') t.classList.add('warn');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show', 'warn'), 2200);
}

// ════════════════════════════════════════════════════════════════
// 폼 채우기 / 리셋 / 이름 변경 동기화
// ════════════════════════════════════════════════════════════════
function fillFormFromOrder(o) {
  setSingle('tempOptions', o.temp);
  setSize(o.size);
  menuInput.value = o.menu || '';
  setMulti('addonOptions', o.addons || []);
  updateAddonCount();
  if (o.addons && o.addons.length) {
    document.querySelector('details.addon-details').open = true;
  }
  document.getElementById('memoInput').value = o.memo || '';
  if (o.memo && o.memo.trim()) {
    document.querySelector('details.memo-details').open = true;
  }
  updateMemoIndicator();
  applyMenuConstraints(o.menu || '');
}

function resetFormFields() {
  setSingle('tempOptions', 'ICE');
  // 카페에 따라 사이즈 프리셋이 다름 — 프리셋 있으면 첫 칩, '기타'면 빈 입력
  const preset = CAFE_PRESETS[CONFIG.cafe] || CAFE_PRESETS.starbucks;
  if (preset.sizes.length === 0) {
    document.getElementById('sizeCustom').value = '';
  } else {
    const firstSize = document.querySelector('#sizeOptions .chip')?.dataset.val;
    if (firstSize) setSingle('sizeOptions', firstSize);
  }
  menuInput.value = '';
  setMulti('addonOptions', []);
  updateAddonCount();
  document.querySelector('details.addon-details').open = false;
  document.querySelector('details.memo-details').open = false;
  document.getElementById('memoInput').value = '';
  updateMemoIndicator();
  applyMenuConstraints('');
}

function updateMemoIndicator() {
  const has = document.getElementById('memoInput').value.trim().length > 0;
  document.getElementById('memoIndicator').textContent = has ? '· 작성됨' : '';
  updateDetailSummary();
}
document.getElementById('memoInput').addEventListener('input', updateMemoIndicator);

function syncFormForSelectedName() {
  const name = nameInput.value.trim();
  if (!name) return;
  if (lastSyncedName === name) return; // 편집 중 덮어쓰기 방지

  const myKey = getOrderKeys()[name];
  const existingOrder = myKey ? currentOrders[myKey] : null;

  // Firebase 데이터 아직 미도착 & 기존 주문 판단 불가 → 보류
  if (!existingOrder && !firebaseDataLoaded) return;

  if (existingOrder) {
    fillFormFromOrder(existingOrder);
    document.getElementById('submitBtn').textContent = '주문 수정하기';
    document.getElementById('deleteBtn').classList.remove('hide');
    document.getElementById('orderEditHint').classList.remove('hide');
  } else {
    const pref = getPrefs()[name];
    if (pref) {
      fillFormFromOrder(pref); // 저장된 선호 메뉴로 기본값 채우기
    } else {
      resetFormFields();
    }
    document.getElementById('submitBtn').textContent = '주문하기';
    document.getElementById('deleteBtn').classList.add('hide');
    document.getElementById('orderEditHint').classList.add('hide');
    if (myKey) setOrderKey(name, null); // stale 정리
  }
  lastSyncedName = name;
  renderList(); // "내 주문" 뱃지 갱신
}

nameInput.addEventListener('change', () => {
  const name = nameInput.value.trim();
  nameInput.value = name; // 앞뒤 공백 정규화
  if (name) localStorage.setItem(LAST_NAME_LS, name);
  lastSyncedName = null;
  updateActiveChip();
  syncFormForSelectedName();
});

// 이름 칩 클릭 — 칩 탭 → input 채움 + 동기화
document.getElementById('nameChips').addEventListener('click', e => {
  const moreBtn = e.target.closest('.name-chip-more');
  if (moreBtn) {
    nameChipsExpanded = !nameChipsExpanded;
    renderNameChips();
    return;
  }
  const chip = e.target.closest('.name-chip');
  if (!chip) return;
  const name = chip.dataset.name;
  if (!name) return;
  nameInput.value = name;
  localStorage.setItem(LAST_NAME_LS, name);
  lastSyncedName = null;
  updateActiveChip();
  syncFormForSelectedName();
});

// 이 이름이 동기화 대상인가? — 멤버 명단에 있거나, 기존 주문 키가 있으면 OK
// (명단에서 삭제됐더라도 이미 주문을 넣은 사람은 자기 주문을 수정/취소할 수 있어야 함)
function isSyncableName(name) {
  if (!name) return false;
  if (CURRENT_MEMBERS.includes(name)) return true;
  return !!getOrderKeys()[name];
}

// 타이핑 중 버튼 상태 즉시 반영 + 유효한 이름 입력 시 debounce 동기화
let nameDebounceTimer;
nameInput.addEventListener('input', () => {
  clearTimeout(nameDebounceTimer);
  const name = nameInput.value.trim();
  updateActiveChip();

  // 동기화 대상 아닌 이름 → 버튼 즉시 초기화
  if (!isSyncableName(name)) {
    document.getElementById('deleteBtn').classList.add('hide');
    document.getElementById('orderEditHint').classList.add('hide');
    document.getElementById('submitBtn').textContent = '주문하기';
    return;
  }

  // 유효한 이름 → 250ms debounce 후 동기화
  nameDebounceTimer = setTimeout(() => {
    if (lastSyncedName !== name) {
      localStorage.setItem(LAST_NAME_LS, name);
      lastSyncedName = null;
      syncFormForSelectedName();
    }
  }, 250);
});

// ════════════════════════════════════════════════════════════════
// 제출 / 취소
// ════════════════════════════════════════════════════════════════
document.getElementById('submitBtn').addEventListener('click', async () => {
  if (!isConfigured) { toast('서버 설정이 필요합니다', 'warn'); return; }
  const name = nameInput.value.trim();
  if (!name) { toast('이름을 입력해주세요', 'warn'); return; }
  if (name.length > 20) { toast('이름은 20자까지 입력할 수 있어요', 'warn'); return; }
  if (isPastDeadline()) { toast('주문이 마감되었습니다', 'warn'); return; }
  const menu = menuInput.value.trim();
  if (!menu) { toast('메뉴를 선택하거나 직접 입력해주세요', 'warn'); return; }
  if (menu.length > 50) { toast('메뉴는 50자까지 입력할 수 있어요', 'warn'); return; }

  const memo = document.getElementById('memoInput').value.trim();
  if (memo.length > 200) { toast('메모는 200자까지 입력할 수 있어요', 'warn'); return; }

  const order = {
    name,
    temp: getSingle('tempOptions'),
    size: getSize(),
    menu,
    addons: getMulti('addonOptions'),
    memo,
    ts: Date.now()
  };

  const submitBtn = document.getElementById('submitBtn');
  const origText = submitBtn.textContent;
  submitBtn.classList.add('loading');
  submitBtn.disabled = true;
  try {
    const { ref, set, push } = window._fb;
    const existingKey = getOrderKeys()[name];
    if (existingKey && currentOrders[existingKey]) {
      await set(ref(db, `rooms/${ROOM_ID}/orders/` + existingKey), order);
      toast('주문을 수정했어요');
      if (typeof gtag === 'function') gtag('event', 'order_modified', { cafe: CONFIG.cafe });
    } else {
      const newRef = push(ordersRef);
      await set(newRef, order);
      setOrderKey(name, newRef.key);
      toast('주문이 들어갔어요!');
      if (typeof gtag === 'function') gtag('event', 'order_submitted', { cafe: CONFIG.cafe });
    }
    lastSyncedName = name;
    savePref(name, order); // 선호 메뉴 저장 (다음 라운드에서 기본값으로 사용)
    submitBtn.textContent = '주문 수정하기';
    document.getElementById('deleteBtn').classList.remove('hide');
    document.getElementById('orderEditHint').classList.remove('hide');
    // 주문 완료 → 전체주문 탭으로 자동 전환 (다음 액션 유도)
    switchTab('status');
    renderList();
  } catch (e) {
    submitBtn.textContent = origText;
    alert('오류: ' + e.message);
  } finally {
    submitBtn.classList.remove('loading');
    submitBtn.disabled = false;
  }
});

document.getElementById('deleteBtn').addEventListener('click', async () => {
  const name = nameInput.value.trim();
  const myKey = name ? getOrderKeys()[name] : null;
  if (!myKey) return;
  if (!confirm('주문을 취소하시겠습니까?')) return;
  try {
    const { ref, remove } = window._fb;
    await remove(ref(db, `rooms/${ROOM_ID}/orders/` + myKey));
    setOrderKey(name, null);
    resetFormFields();
    document.getElementById('submitBtn').textContent = '주문하기';
    document.getElementById('deleteBtn').classList.add('hide');
    document.getElementById('orderEditHint').classList.add('hide');
    lastSyncedName = name; // 빈 상태로 동기화됨
    toast('주문을 취소했어요');
    if (typeof gtag === 'function') gtag('event', 'order_cancelled');
    renderList();
  } catch (e) {
    alert('오류: ' + e.message);
  }
});

// ════════════════════════════════════════════════════════════════
// 실시간 수신 & 렌더
// ════════════════════════════════════════════════════════════════
let prevOrderCount = 0;

function renderHostDashboard() {
  const container = document.getElementById('hostDashContent');
  const dash = document.getElementById('hostDashboard');
  const shareBtn = document.getElementById('hostShareBtn');
  if (!container || !dash || !IS_OWNER) return;
  const count = Object.keys(currentOrders).length;
  if (count === 0) {
    container.innerHTML = '<p class="host-empty">링크를 공유하면 여기에 주문이 하나씩 쌓여요</p>';
    dash.classList.remove('compact');
    shareBtn.textContent = '팀원에게 링크 보내기 📤';
  } else {
    container.innerHTML = `<div class="host-count">${count}명 주문 완료</div>`;
    dash.classList.add('compact');
    shareBtn.textContent = '+ 링크 더 보내기';
  }
}

if (isConfigured) {
  const { onValue } = window._fb;
  onValue(ordersRef, snap => {
    currentOrders = snap.val() || {};
    firebaseDataLoaded = true;
    const n = Object.keys(currentOrders).length;
    // 실시간 알림 (방장에게만)
    if (IS_OWNER && n > prevOrderCount && prevOrderCount > 0) {
      const newest = Object.values(currentOrders).sort((a, b) => (b.ts || 0) - (a.ts || 0))[0];
      if (newest) toast(`${newest.name}님이 ${newest.menu}를 주문했어요`);
    }
    prevOrderCount = n;
    renderList();
    renderSummary();
    renderHostDashboard();
    document.getElementById('orderCount').textContent = n ? `(${n})` : '';
    document.title = n ? `(${n}) ${CONFIG.title} · 커피 골든벨` : `${CONFIG.title} · 커피 골든벨`;
    syncFormForSelectedName();
  });
}

function formatOrder(o) {
  const parts = [];
  if (o.temp) parts.push(o.temp);
  if (o.size) parts.push(o.size);
  parts.push(o.menu || '');
  let s = parts.filter(Boolean).join(' ');
  if (o.addons && o.addons.length) s += ' (' + o.addons.join(', ') + ')';
  return s;
}

function renderList() {
  const list = document.getElementById('orderList');
  const currentName = nameInput.value;
  const myKey = currentName ? getOrderKeys()[currentName] : null;
  const entries = Object.entries(currentOrders)
    .sort((a, b) => (a[1].ts || 0) - (b[1].ts || 0));
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty">아직 첫 주문을 기다리고 있어요</div>';
    return;
  }
  list.innerHTML = entries.map(([k, o]) => {
    const isMine = k === myKey;
    return `<div class="order-item${isMine ? ' is-mine' : ''}">
      <div class="order-name">${escapeHtml(o.name)}${isMine ? '<span class="mine">내 주문</span>' : ''}</div>
      <div class="order-menu">${escapeHtml(formatOrder(o))}</div>
      ${o.memo ? `<div class="order-memo">${escapeHtml(o.memo)}</div>` : ''}
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════════════════
// 요약 탭: 메뉴 집계 + 변형별 주문 완료 체크
// ════════════════════════════════════════════════════════════════
// 카운터에서 한 항목씩 주문하면서 탭하면 체크/취소 (in-memory)
const checkedVariants = new Set();

const TEMP_ORDER = ['ICE', 'HOT'];
const SIZE_ORDER = ['Tall', 'Grande', 'Venti'];

function makeVariantKey(menu, v) {
  return `${menu}::${v.temp}|${v.size}|${v.addons.join(',')}|${v.memo || ''}`;
}

// 주문 목록 → 메뉴별로 묶고, 각 메뉴 내부에서 (온도/사이즈/옵션/메모) 변형별로 카운트
// 스타벅스 주문 흐름(메뉴 → 온도 → 사이즈 → 옵션/요구사항)에 맞춰 정렬
function buildGroupedOrders(orders) {
  const groups = {}; // menu → { count, variants: { variantKey → {temp,size,addons,memo,count} } }
  orders.forEach(o => {
    const menu = (o.menu || '').trim() || '기타';
    const temp = o.temp || '';
    const size = o.size || '';
    const addons = Array.isArray(o.addons) ? o.addons.slice() : [];
    const memo = (o.memo || '').trim();
    // 메모도 변형 키에 포함 → 같은 메뉴/사이즈라도 메모가 다르면 별도 행
    const variantKey = `${temp}|${size}|${addons.join(',')}|${memo}`;
    if (!groups[menu]) groups[menu] = { count: 0, variants: {} };
    groups[menu].count++;
    if (!groups[menu].variants[variantKey]) {
      groups[menu].variants[variantKey] = { temp, size, addons, memo, count: 0 };
    }
    groups[menu].variants[variantKey].count++;
  });
  // 메뉴 정렬: 잔 수 많은 순 → 한글 가나다
  const sortedMenus = Object.entries(groups)
    .sort((a, b) => b[1].count - a[1].count || a[0].localeCompare(b[0], 'ko'));
  // 각 메뉴 내부의 변형 정렬: 온도 → 사이즈 → 옵션 → 메모
  const idx = (arr, v) => { const i = arr.indexOf(v); return i === -1 ? 999 : i; };
  sortedMenus.forEach(([_, g]) => {
    g.sortedVariants = Object.values(g.variants).sort((a, b) => {
      const dt = idx(TEMP_ORDER, a.temp) - idx(TEMP_ORDER, b.temp);
      if (dt) return dt;
      const ds = idx(SIZE_ORDER, a.size) - idx(SIZE_ORDER, b.size);
      if (ds) return ds;
      const da = a.addons.join(',').localeCompare(b.addons.join(','));
      if (da) return da;
      return (a.memo || '').localeCompare(b.memo || '');
    });
  });
  return sortedMenus;
}

function renderSummary() {
  const list = document.getElementById('summaryList');
  const copyBtn = document.getElementById('copyBtn');
  const orders = Object.values(currentOrders);
  if (orders.length === 0) {
    list.innerHTML = '<div class="empty">아직 첫 주문을 기다리고 있어요</div>';
    copyBtn.classList.add('hide');
    return;
  }
  copyBtn.classList.remove('hide');
  const sortedMenus = buildGroupedOrders(orders);
  const total = orders.length;
  const prev = list.querySelector('details.summary-details');
  const wasOpen = prev ? prev.open : false;
  let html = `<div class="summary-progress">총 ${total}잔</div>
  <details class="summary-details"${wasOpen ? ' open' : ''}>
    <summary><span>주문할 때 펼쳐서 확인하기</span></summary>
    <div class="summary-details-body">`;

  sortedMenus.forEach(([menu, g]) => {
    html += `<div class="menu-group">
      <div class="menu-group-header">
        <span class="menu-name">${escapeHtml(menu)}</span>
        <span class="menu-count">${g.count}잔</span>
      </div>
      <div class="menu-variants">`;
    g.sortedVariants.forEach(v => {
      const parts = [v.temp, v.size].filter(Boolean);
      if (v.addons.length) parts.push(v.addons.join(', '));
      let line = parts.join(' ');
      if (v.memo) line += ` <span style="color:var(--muted);font-size:11px">(${escapeHtml(v.memo)})</span>`;
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 8px;font-size:13px;">
        <span>${line}</span>
        <span style="font-weight:700;color:var(--ink-dark)">× ${v.count}</span>
      </div>`;
    });
    html += `</div></div>`;
  });

  html += `    </div>
  </details>
  <div class="summary-total">
    <span>총계</span>
    <span>${total}잔</span>
  </div>`;

  list.innerHTML = html;
}

// 변형 체크박스 변경 → Set 갱신 + 진행률 즉시 갱신
document.getElementById('summaryList').addEventListener('change', e => {
  const cb = e.target.closest('input.variant-check');
  if (!cb) return;
  const vk = cb.dataset.vkey;
  if (cb.checked) checkedVariants.add(vk); else checkedVariants.delete(vk);
  renderSummary();
});

// ════════════════════════════════════════════════════════════════
// 요약 복사: 새 포맷 (온도/사이즈 그룹 + 특이사항)
// ════════════════════════════════════════════════════════════════
document.getElementById('copyBtn').addEventListener('click', async () => {
  const orders = Object.values(currentOrders);
  if (orders.length === 0) { toast('아직 주문이 없어요'); return; }
  const sortedMenus = buildGroupedOrders(orders);

  const lines = [];
  lines.push(`${CONFIG.title} · 총 ${orders.length}잔`);
  lines.push('');
  sortedMenus.forEach(([menu, g]) => {
    lines.push(`[${menu}] ${g.count}잔`);
    g.sortedVariants.forEach(v => {
      const parts = [v.temp, v.size].filter(Boolean);
      if (v.addons.length) parts.push(v.addons.join(', '));
      let line = `· ${parts.join(' ')} × ${v.count}`;
      if (v.memo) line += `  (${v.memo})`;
      lines.push(line);
    });
    lines.push('');
  });

  const text = lines.join('\n').replace(/\n+$/, '');
  try {
    await navigator.clipboard.writeText(text);
    toast('요약을 복사했어요!');
  } catch (e) {
    alert(text);
  }
});

// TODO: 주문 히스토리 기능 (다음 세션에서 구현)
// ────────────────────────────────────────────────────────────────
// 1. 초기화 시 기존 주문을 삭제하지 않고 rooms/$roomId/history/에 아카이브
// 2. 히스토리 열람 UI (과거 라운드 목록 + 상세)
// 3. "이전 주문 가져오기" — 새 라운드 시작 시 직전 주문을 복사해서
//    팀원들이 확인/수정만 하면 되게 하는 플로우
// 4. 활용 예시: "저번에 시켰던 것처럼 시키려고 하는데 수정하실분은
//    언제까지 수정해주세요!" 같은 재주문 시나리오
// ────────────────────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', async () => {
  if (!isConfigured) { toast('서버 설정이 필요합니다', 'warn'); return; }
  if (!confirm(`모든 주문을 초기화하고 새 라운드를 시작할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;
  try {
    const { ref, remove, set, get } = window._fb;
    // 기존 주문을 히스토리에 아카이브 (데이터 보존)
    const snap = await get(ref(db, `rooms/${ROOM_ID}/orders`));
    if (snap.exists()) {
      const archiveKey = Date.now();
      await set(ref(db, `rooms/${ROOM_ID}/history/${archiveKey}`), {
        orders: snap.val(),
        archivedAt: archiveKey,
        cafe: CONFIG.cafe,
        title: CONFIG.title,
      });
    }
    await remove(ref(db, `rooms/${ROOM_ID}/orders`));
    localStorage.removeItem(ORDER_KEYS_LS);
    toast('새 라운드를 시작했어요!');
    if (typeof gtag === 'function') gtag('event', 'round_reset');
    setTimeout(() => location.reload(), 1500);
  } catch (e) {
    alert('오류: ' + e.message);
  }
});

document.getElementById('retryBtn').addEventListener('click', () => {
  document.getElementById('resetBtn').click();
});

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
